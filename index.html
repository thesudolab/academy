<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TheSudoLab Academy — Pentesting & SOC Analyst Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0A0E16;
    --surface: #121826;
    --surface-2: #171F30;
    --border: #262F45;
    --text: #E9EDF3;
    --text-dim: #8A94A8;
    --amber: #FFB020;
    --amber-dim: #7A5A1E;
    --cyan: #38BDF8;
    --red: #F0546B;
    --green: #34D399;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html{ scroll-behavior: smooth; }

  body{
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overflow-x: hidden;
    position: relative;
  }

  /* faint scanline / grid texture */
  body::before{
    content:"";
    position: fixed;
    inset:0;
    pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 42px 42px;
    z-index: 0;
    mask-image: radial-gradient(circle at 50% 20%, black, transparent 75%);
  }

  a{ color:inherit; text-decoration:none; }
  :focus-visible{ outline: 2px solid var(--amber); outline-offset: 3px; border-radius: 4px; }

  .wrap{ max-width: 1280px; margin: 0 auto; padding: 0 32px; position: relative; z-index: 1; }

  /* ---------- NAV ---------- */
  header{ padding: 22px 32px; }
  .nav-row{
    max-width: 1280px; margin: 0 auto;
    display:flex; align-items:center; justify-content:space-between; gap: 18px;
    flex-wrap: wrap;
  }
  .brand{ display:flex; align-items:center; gap:12px; }
  .brand-mark{
    width: 42px; height:42px; border-radius: 12px;
    background: linear-gradient(155deg, var(--amber), #C97A0E);
    display:flex; align-items:center; justify-content:center;
    font-family: var(--mono); font-weight:800; color:#181008; font-size:18px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 8px 20px rgba(255,176,32,0.18);
  }
  .brand-text{ line-height: 1.05; }
  .brand-text .name{ font-family: var(--mono); font-weight:700; font-size: 17px; letter-spacing: -0.2px; }
  .brand-text .tag{ font-size: 11px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; font-family: var(--mono); }

  .pillnav{
    display:flex; align-items:center; gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px; border-radius: 999px;
  }
  .pillnav a{
    font-family: var(--mono);
    font-size: 13.5px;
    padding: 10px 18px;
    border-radius: 999px;
    color: var(--text-dim);
    transition: all .18s ease;
    white-space: nowrap;
  }
  .pillnav a:hover{ color: var(--text); }
  .pillnav a.active{
    background: var(--text);
    color: #0A0E16;
    font-weight: 700;
  }

  .contact-pill{
    display:flex; align-items:center; gap: 12px;
    background: var(--amber);
    color: #1A1204;
    padding: 10px 10px 10px 20px;
    border-radius: 999px;
    font-family: var(--mono);
    font-weight: 700;
  }
  .contact-pill .sub{ font-size: 10px; font-weight: 500; opacity: .75; display:block; letter-spacing: .5px;}
  .contact-pill .arrow{
    width: 34px; height:34px; border-radius: 50%;
    background: #1A1204; color: var(--amber);
    display:flex; align-items:center; justify-content:center;
    font-size: 16px;
  }

  @media (max-width: 980px){
    .pillnav{ order: 3; width: 100%; justify-content: center; flex-wrap: wrap; }
    .nav-row{ justify-content: center; }
  }

  /* ---------- BADGES ---------- */
  .badges{ display:flex; flex-direction:column; align-items:center; gap:14px; margin: 28px 0 40px; }
  .badge{
    font-family: var(--mono); font-size: 13px;
    padding: 9px 20px; border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--cyan);
    display:flex; align-items:center; gap:8px;
  }
  .badge .dot{ width:7px; height:7px; border-radius:50%; background: var(--green); box-shadow: 0 0 8px var(--green); }
  .badge b{ color: var(--text); }
  .badge-new{
    background: linear-gradient(90deg, rgba(255,176,32,0.16), rgba(56,189,248,0.16));
    border: 1px solid rgba(255,176,32,0.35);
    color: var(--text);
    font-weight: 600;
  }

  /* ---------- HERO ---------- */
  .hero{ position: relative; padding-bottom: 90px; }
  .hero-grid{
    display:grid; grid-template-columns: 1fr; gap: 0;
    position: relative;
  }
  h1{
    font-family: var(--mono);
    font-weight: 800;
    text-align:center;
    font-size: clamp(38px, 6vw, 78px);
    line-height: 1.05;
    letter-spacing: -1.5px;
    margin: 0 auto 26px;
    max-width: 980px;
  }
  h1 .accent{ color: var(--amber); }
  h1 .glitch{ color: var(--cyan); }

  .hero-sub{
    text-align:center;
    max-width: 680px;
    margin: 0 auto 34px;
    color: var(--text-dim);
    font-size: 17px;
    line-height: 1.65;
  }

  .cta-row{ display:flex; flex-direction:column; align-items:center; gap: 12px; }
  .cta-btn{
    font-family: var(--mono);
    background: var(--text);
    color: #0A0E16;
    font-weight: 700;
    padding: 16px 30px;
    border-radius: 999px;
    display:inline-flex; align-items:center; gap: 10px;
    font-size: 15px;
    transition: transform .15s ease;
  }
  .cta-btn:hover{ transform: translateY(-2px); }
  .cta-note{ color: var(--text-dim); font-size: 13px; font-family: var(--mono); }

  /* floating testimonial */
  .float-card{
    position: absolute;
    left: 0;
    top: 300px;
    width: 300px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px 22px 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.45);
  }
  .stars{ color: var(--amber); letter-spacing: 3px; margin-bottom: 10px; font-size: 14px; }
  .float-card p{ font-size: 13.5px; line-height: 1.7; color: var(--text); margin-bottom: 16px; }
  .float-person{ display:flex; align-items:center; gap: 10px; }
  .avatar{
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(155deg, var(--cyan), #1C6E93);
    display:flex; align-items:center; justify-content:center;
    font-family: var(--mono); font-weight:700; font-size: 14px; color:#04121A;
  }
  .float-person .who{ font-weight: 700; font-size: 13.5px; }
  .float-person .where{ font-size: 11.5px; color: var(--text-dim); font-family: var(--mono); }

  /* terminal window */
  .terminal{
    position: absolute;
    right: 0;
    top: 260px;
    width: 380px;
    background: #0C1220;
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0,0,0,0.55);
  }
  .term-bar{
    display:flex; align-items:center; gap:7px;
    padding: 12px 14px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
  }
  .term-bar span{ width:10px; height:10px; border-radius:50%; }
  .term-bar span:nth-child(1){ background: var(--red); }
  .term-bar span:nth-child(2){ background: var(--amber); }
  .term-bar span:nth-child(3){ background: var(--green); }
  .term-title{ margin-left: 8px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .term-body{
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.9;
    padding: 18px;
    min-height: 230px;
    color: #C9D6E5;
  }
  .term-body .prompt{ color: var(--green); }
  .term-body .warn{ color: var(--amber); }
  .term-body .crit{ color: var(--red); }
  .term-body .info{ color: var(--cyan); }
  .term-body .ok{ color: var(--green); }
  .cursor{ display:inline-block; width:7px; height:14px; background: var(--cyan); vertical-align: middle; animation: blink 1s steps(1) infinite; }
  @keyframes blink{ 50%{ opacity: 0; } }

  .social-rail{
    position: absolute; right: -46px; top: 260px;
    display:flex; flex-direction: column; gap: 10px;
  }
  .social-rail a{
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-size: 15px; color: var(--text-dim);
  }

  @media (max-width: 1180px){
    .float-card, .terminal, .social-rail{ position: static; width: 100%; margin: 22px auto; max-width: 380px; }
    .social-rail{ flex-direction: row; justify-content:center; margin-top: 0; }
  }

  /* ---------- STATS ---------- */
  .stats{
    display:grid; grid-template-columns: repeat(4,1fr); gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    margin: 60px 0;
  }
  .stat{ background: var(--surface); padding: 26px 20px; text-align:center; }
  .stat .num{ font-family: var(--mono); font-size: 30px; font-weight: 800; color: var(--text); }
  .stat .num span{ color: var(--amber); }
  .stat .label{ font-size: 12.5px; color: var(--text-dim); margin-top: 6px; }
  @media (max-width: 700px){ .stats{ grid-template-columns: 1fr 1fr; } }

  /* ---------- SECTION HEADERS ---------- */
  .eyebrow{
    font-family: var(--mono); font-size: 12.5px; color: var(--amber);
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px;
    display:flex; align-items:center; gap: 8px; justify-content:center;
  }
  .eyebrow::before{ content: "//"; color: var(--text-dim); }
  .section-title{
    font-family: var(--mono); font-weight: 800; text-align:center;
    font-size: clamp(28px, 4vw, 42px); letter-spacing: -1px; margin-bottom: 14px;
  }
  .section-sub{ text-align:center; color: var(--text-dim); max-width: 620px; margin: 0 auto 50px; line-height: 1.6; }

  section{ padding: 70px 0; position: relative; z-index:1; }

  /* ---------- TRACKS ---------- */
  .tracks{ display:grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width: 860px){ .tracks{ grid-template-columns: 1fr; } }
  .track-card{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 34px;
    position: relative;
    overflow: hidden;
  }
  .track-card.red::before{ content:""; position:absolute; inset:0; background: radial-gradient(circle at 100% 0%, rgba(240,84,107,0.09), transparent 55%); }
  .track-card.blue::before{ content:""; position:absolute; inset:0; background: radial-gradient(circle at 100% 0%, rgba(56,189,248,0.09), transparent 55%); }
  .track-tag{
    font-family: var(--mono); font-size: 11.5px; padding: 5px 12px; border-radius: 999px;
    display:inline-block; margin-bottom: 18px; letter-spacing: 1px;
  }
  .track-card.red .track-tag{ background: rgba(240,84,107,0.15); color: var(--red); }
  .track-card.blue .track-tag{ background: rgba(56,189,248,0.15); color: var(--cyan); }
  .track-card h3{ font-family: var(--mono); font-size: 24px; margin-bottom: 12px; letter-spacing: -0.5px; }
  .track-card p{ color: var(--text-dim); font-size: 14.5px; line-height: 1.7; margin-bottom: 22px; }
  .track-list{ list-style:none; margin-bottom: 26px; }
  .track-list li{ font-size: 13.5px; color: var(--text); padding: 8px 0; border-bottom: 1px dashed var(--border); display:flex; gap:10px; }
  .track-list li:last-child{ border-bottom:none; }
  .track-card.red .track-list li::before{ content:"›"; color: var(--red); font-weight:700; }
  .track-card.blue .track-list li::before{ content:"›"; color: var(--cyan); font-weight:700; }
  .track-link{
    font-family: var(--mono); font-size: 13.5px; font-weight: 700;
    display:inline-flex; align-items:center; gap:8px;
    padding: 12px 22px; border-radius: 999px;
  }
  .track-card.red .track-link{ background: var(--red); color:#25060B; }
  .track-card.blue .track-link{ background: var(--cyan); color:#03222E; }

  /* ---------- CURRICULUM PHASES ---------- */
  .phase-line{ position: relative; max-width: 820px; margin: 0 auto; }
  .phase{
    display:grid; grid-template-columns: 90px 1fr; gap: 24px;
    padding: 26px 0; border-bottom: 1px solid var(--border);
  }
  .phase:last-child{ border-bottom:none; }
  .phase-num{ font-family: var(--mono); font-size: 34px; font-weight: 800; color: var(--surface-2); -webkit-text-stroke: 1px var(--border); }
  .phase h4{ font-family: var(--mono); font-size: 17px; margin-bottom: 8px; }
  .phase p{ color: var(--text-dim); font-size: 14px; line-height: 1.65; }
  .phase .tools{ margin-top: 10px; display:flex; flex-wrap:wrap; gap: 8px; }
  .tools span{ font-family: var(--mono); font-size: 11px; color: var(--text-dim); border:1px solid var(--border); padding: 4px 10px; border-radius: 999px; }

  /* ---------- REVIEWS ---------- */
  .reviews-grid{ display:grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
  @media (max-width: 900px){ .reviews-grid{ grid-template-columns: 1fr; } }
  .review-card{ background: var(--surface); border:1px solid var(--border); border-radius: 18px; padding: 26px; }
  .review-card p{ font-size: 13.5px; color: var(--text); line-height: 1.7; margin: 12px 0 18px; }

  /* ---------- FOOTER CTA ---------- */
  .footer-cta{
    text-align:center; background: var(--surface);
    border: 1px solid var(--border); border-radius: 24px;
    padding: 60px 30px; margin-bottom: 60px;
  }
  footer{ text-align:center; padding: 30px 0 50px; color: var(--text-dim); font-size: 12.5px; font-family: var(--mono); }
  footer a{ color: var(--cyan); }
</style>
</head>
<body>

<header>
  <div class="nav-row">
    <div class="brand" id="brandBox"></div>
    <nav class="pillnav" id="navBox"></nav>
    <div id="contactBox"></div>
  </div>
</header>

<main class="wrap hero">
  <div class="badges" id="badgesBox"></div>

  <div class="hero-grid">
    <div id="heroBox"></div>

    <div class="float-card" id="testimonialBox"></div>

    <div class="terminal">
      <div class="term-bar">
        <span></span><span></span><span></span>
        <span class="term-title" id="termTitle">// RED TEAM SESSION</span>
      </div>
      <div class="term-body" id="termBody"></div>
    </div>

    <div class="social-rail" id="socialBox"></div>
  </div>

  <div class="stats" id="statsBox"></div>
</main>

<section id="tracks">
  <div class="wrap">
    <div id="tracksHead"></div>
    <div class="tracks" id="tracksBox"></div>
  </div>
</section>

<section id="curriculum">
  <div class="wrap">
    <div id="curriculumHead"></div>
    <div class="phase-line" id="curriculumBox"></div>
  </div>
</section>

<section id="reviews">
  <div class="wrap">
    <div id="reviewsHead"></div>
    <div class="reviews-grid" id="reviewsBox"></div>
  </div>
</section>

<section>
  <div class="wrap">
    <div class="footer-cta" id="footerCtaBox"></div>
  </div>
</section>

<footer id="footerBox"></footer>

<script src="content.js"></script>
<script src="app.js"></script>

</body>
</html>
